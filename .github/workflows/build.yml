name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.2
          target: esp32p4
          path: '.'

  host-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run wifi_manager host tests
        run: make -C components/wifi_manager/host_test test

      - name: Run settings_store host tests
        run: make -C components/settings_store/host_test test

      - name: Run market_data_client host tests
        run: make -C components/market_data_client/host_test test

      - name: Run market_data_ws_client host tests
        run: make -C components/market_data_ws_client/host_test test

      - name: Run app_state host tests
        run: make -C components/app_state/host_test test

      - name: Run ota_client host tests
        run: make -C components/ota_client/host_test test

      - name: Run display_format host tests
        run: make -C components/display_format/host_test test

  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      # Scoped to the same pure-logic files the host-tests job already
      # compiles with plain gcc (no ESP-IDF includes) - running cppcheck
      # against ESP-IDF-glue files here would need $IDF_PATH and would
      # otherwise just produce missing-include noise.
      - name: Run cppcheck on host-testable modules
        run: |
          cppcheck --enable=warning,style,performance,portability --std=c11 \
            --error-exitcode=1 --inline-suppr \
            --suppress=missingIncludeSystem --suppress=unusedFunction \
            -I components/wifi_manager/src -I components/wifi_manager/include \
            -I components/settings_store/src -I components/settings_store/include \
            -I components/market_data_client/src -I components/market_data_client/include \
            -I components/market_data_ws_client/src -I components/market_data_ws_client/include \
            -I components/app_state/src -I components/app_state/include \
            -I components/ota_client/src -I components/ota_client/include \
            -I components/display_format/src -I components/display_format/include \
            components/wifi_manager/src/wifi_policy.c \
            components/wifi_manager/src/wifi_profile_codec.c \
            components/settings_store/src/settings_codec.c \
            components/market_data_client/src/market_data_url.c \
            components/market_data_client/src/market_data_json_scanner.c \
            components/market_data_client/src/market_data_symbol_parser.c \
            components/market_data_client/src/market_data_klines_parser.c \
            components/market_data_client/src/market_data_ticker_parser.c \
            components/market_data_ws_client/src/market_data_ws_url.c \
            components/market_data_ws_client/src/market_data_ws_stream_parser.c \
            components/market_data_ws_client/src/market_data_ws_control.c \
            components/app_state/src/app_state_retry_policy.c \
            components/app_state/src/app_state_kline_merge.c \
            components/ota_client/src/ota_client_json.c \
            components/display_format/src/display_format.c

  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      # Report-only: no .clang-format existed before this phase, so a
      # repo-wide dry-run diff hasn't been reviewed yet. This job surfaces
      # drift on every PR without blocking merges; flipping it to blocking
      # is a deliberate future step once that diff has been reviewed.
      - name: Check formatting (non-blocking)
        continue-on-error: true
        run: |
          find components main -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror -style=file
